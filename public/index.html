<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meta Blog API Frontend</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="glass-bg"></div>
  
  <nav class="navbar glass">
    <div class="logo">MetaBlog</div>
    <div class="nav-links">
      <button id="nav-login-btn" class="btn btn-outline">Login</button>
      <button id="nav-register-btn" class="btn btn-primary">Register</button>
      <div id="user-info" class="hidden">
        <span id="user-email"></span>
        <button id="nav-logout-btn" class="btn btn-outline">Logout</button>
      </div>
    </div>
  </nav>

  <main class="container">
    <header class="hero">
      <h1>Welcome to MetaBlog</h1>
      <p>A beautiful, modern blog built with Node.js and Express.</p>
    </header>

    <section id="create-post-section" class="hidden fade-in">
      <div class="card glass">
        <h2>Create a Post</h2>
        <form id="create-post-form">
          <div class="form-group">
            <label for="post-title">Title</label>
            <input type="text" id="post-title" required placeholder="What's on your mind?">
          </div>
          <div class="form-group">
            <label for="post-content">Content</label>
            <textarea id="post-content" rows="4" required placeholder="Write your amazing post here..."></textarea>
          </div>
          <button type="submit" class="btn btn-primary w-full">Publish</button>
        </form>
      </div>
    </section>

    <section class="feed">
      <div class="feed-header">
        <h2>Latest Posts</h2>
        <button id="refresh-posts-btn" class="btn btn-icon" title="Refresh">↻</button>
      </div>
      <div id="posts-container" class="posts-grid">
        <!-- Posts will be rendered here -->
      </div>
    </section>
  </main>

  <!-- Modals -->
  <div id="auth-modal" class="modal-overlay hidden">
    <div class="modal-content glass fade-in-up">
      <button class="close-modal">&times;</button>
      <h2 id="modal-title">Login</h2>
      <form id="auth-form">
        <div class="form-group" id="name-group" style="display: none;">
          <label for="auth-name">Name</label>
          <input type="text" id="auth-name" placeholder="John Doe">
        </div>
        <div class="form-group">
          <label for="auth-email">Email</label>
          <input type="email" id="auth-email" required placeholder="john@example.com">
        </div>
        <div class="form-group">
          <label for="auth-password">Password</label>
          <input type="password" id="auth-password" required placeholder="••••••••">
        </div>
        <p id="auth-error" class="error-msg"></p>
        <button type="submit" class="btn btn-primary w-full" id="auth-submit-btn">Login</button>
      </form>
      <p class="auth-switch">
        <span id="auth-switch-text">Don't have an account?</span> 
        <a href="#" id="auth-switch-link">Register here</a>
      </p>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
